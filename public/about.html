<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>About Us</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: auto;
      background: #38bdf8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
    }

    .nombre {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .rol {
      font-size: 14px;
      color: #94a3b8;
    }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>👥 Nuestro Equipo</h1>
  <p>Proyecto de monitoreo de Dioxido de Carbono Relativo con ESP32</p>

  <div class="cards">

    <div class="card">
      <div class="avatar">B</div>
      <div class="nombre">Breiner Ramirez</div>
      <div class="rol">Programador de hardware</div>
    </div>

    <div class="card">
      <div class="avatar">L</div>
      <div class="nombre">Luis Bertiz</div>
      <div class="rol">Maquetador de interfaces</div>
    </div>

    <div class="card">
      <div class="avatar">J</div>
      <div class="nombre">Joseph Cordoba</div>
      <div class="rol">Integrador de APIs</div>
    </div>

    <div class="card">
      <div class="avatar">C</div>
      <div class="nombre">Camilo Herrera</div>
      <div class="rol">Administrador de bases de datos</div>
    </div>

  </div>

  <button onclick="volver()">⬅ Volver al Dashboard</button>

</div>

<script>
function volver() {
  window.location = "/";
}
</script>

</body>
</html>
