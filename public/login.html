<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 40px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: white;
      outline: none;
    }

    input:focus {
      border: 1px solid #38bdf8;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    .error {
      color: #ef4444;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🔐 Iniciar Sesión</h2>

  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>

  <div class="error" id="error"></div>

  <p>¿No tienes cuenta? <a href="/register.html">Regístrate</a></p>
</div>

<script>
async function login() {
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    window.location = "/";
  } else {
    document.getElementById("error").innerText = data.error || "Error";
  }
}
</script>

</body>
</html>
