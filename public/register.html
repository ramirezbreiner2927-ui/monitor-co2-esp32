<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 40px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: white;
      outline: none;
    }

    input:focus {
      border: 1px solid #38bdf8;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    .msg {
      margin-top: 10px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>📝 Crear Cuenta</h2>

  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="register()">Registrar</button>

  <div class="msg" id="msg"></div>

  <p>¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a></p>
</div>

<script>
async function register() {
  const res = await fetch('/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  document.getElementById("msg").innerText = "Usuario creado ✔️";

  setTimeout(() => {
    window.location = "/login.html";
  }, 1500);
}
</script>

</body>
</html>
